name: smc
description: "Smart City Health & Services Management System - A premium, real-time Flutter application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase Core & Auth
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # Database & Storage
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6

  # State Management
  provider: ^6.1.2

  # Networking & APIs
  http: ^1.2.1
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.0

  # Local Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.5

  # Maps & Location
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  permission_handler: ^12.0.1

  # UI Components & Styling
  google_fonts: ^8.0.1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10
  skeletonizer: ^2.1.3
  animate_do: ^4.2.0
  fl_chart: ^1.1.1
  qr_flutter: ^4.1.0
  image_picker: ^1.1.1
  image: ^4.0.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  confetti: ^0.8.0

  # Utilities
  pdf: ^3.11.3
  open_filex: ^4.7.0
  device_info_plus: ^12.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_maps_flutter_platform_interface: ^2.14.1
  flutter_local_notifications: ^20.1.0
  web_socket_channel: ^3.0.3
  csv: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
  #   - assets/images/
  #   - assets/animations/
